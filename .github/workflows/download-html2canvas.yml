name: Download html2canvas

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create directory
      run: |
        mkdir -p public/js
        echo "Directory created at: $(pwd)/public/js"
        ls -la public/js/
    
    - name: Download html2canvas
      run: |
        echo "Downloading from: https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
        wget --verbose --output-document=public/js/html2canvas.min.js https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js
        DOWNLOAD_EXIT_CODE=$?
        echo "Download exit code: $DOWNLOAD_EXIT_CODE"
        if [ $DOWNLOAD_EXIT_CODE -ne 0 ]; then
          echo "❌ Download failed with exit code $DOWNLOAD_EXIT_CODE"
          exit $DOWNLOAD_EXIT_CODE
        fi
    
    - name: Verify download
      run: |
        echo "Checking downloaded file..."
        ls -la public/js/
        if [ -f public/js/html2canvas.min.js ]; then
          FILE_SIZE=$(stat -c%s "public/js/html2canvas.min.js")
          echo "✅ File exists! Size: $FILE_SIZE bytes"
          if [ $FILE_SIZE -lt 1000 ]; then
            echo "⚠️ Warning: File is too small! Might be an error page."
            cat public/js/html2canvas.min.js
            exit 1
          fi
          head -c 200 public/js/html2canvas.min.js
        else
          echo "❌ File not found at public/js/html2canvas.min.js"
          exit 1
        fi
    
    - name: Commit and push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add public/js/html2canvas.min.js
        if git diff --cached --quiet; then
          echo "ℹ️ No changes to commit (file might already exist)"
        else
          git commit -m "Add html2canvas.min.js v1.4.1"
          git push
          echo "✅ Successfully committed and pushed!"
        fi
