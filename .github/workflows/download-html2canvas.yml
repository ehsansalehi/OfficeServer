name: Download File to Source

on:
  workflow_dispatch:  # اجرای دستی

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # اجازه نوشتن در مخزن
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create target directory
      run: |
        mkdir -p assets/js
        echo "✅ Directory created"
    
    - name: Download html2canvas
      run: |
        echo "📥 Downloading file..."
        curl -L --retry 3 --retry-delay 2 -o assets/js/html2canvas.min.js https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js
        echo "Download exit code: $?"
    
    - name: Verify file
      run: |
        if [ -f assets/js/html2canvas.min.js ] && [ -s assets/js/html2canvas.min.js ]; then
          FILE_SIZE=$(wc -c < assets/js/html2canvas.min.js)
          echo "✅ File downloaded successfully! Size: $FILE_SIZE bytes"
          file assets/js/html2canvas.min.js
        else
          echo "❌ Download failed or file is empty"
          exit 1
        fi
    
    - name: Commit and push to source
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add assets/js/html2canvas.min.js
        if git diff --staged --quiet; then
          echo "ℹ️ No changes to commit"
        else
          git commit -m "Add html2canvas.min.js v1.4.1 to source [skip ci]"
          git push
          echo "✅ File uploaded to source code!"
        fi
