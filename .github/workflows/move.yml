name: Download OfficeServer.iso to repository

on:
  workflow_dispatch:

jobs:
  download-file:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download OfficeServer.iso from Release
      run: |
        # آدرس صحیح را اینجا قرار دهید - ابتدا صحت آن را در مرورگر چک کنید
        FILE_URL="https://release-assets.githubusercontent.com/github-production-release-asset/1227942550/0c7d44a4-0896-4edb-9c56-ba5869530ea0?sp=r&sv=2018-11-09&sr=b&spr=https&se=2026-05-04T15%3A20%3A41Z&rscd=attachment%3B+filename%3DOfficeServer.iso&rsct=application%2Foctet-stream&skoid=96c2d410-5711-43a1-aedd-ab1947aa7ab0&sktid=398a6654-997b-47e9-b12b-9515b896b4de&skt=2026-05-04T14%3A19%3A55Z&ske=2026-05-04T15%3A20%3A41Z&sks=b&skv=2018-11-09&sig=czbmRb3GXYHg2mdp%2FBBLvS7%2FeKQbRvAs54uoVDFB4pg%3D&jwt=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJnaXRodWIuY29tIiwiYXVkIjoicmVsZWFzZS1hc3NldHMuZ2l0aHVidXNlcmNvbnRlbnQuY29tIiwia2V5Ijoia2V5MSIsImV4cCI6MTc3NzkwODUzMCwibmJmIjoxNzc3OTA0OTMwLCJwYXRoIjoicmVsZWFzZWFzc2V0cHJvZHVjdGlvbi5ibG9iLmNvcmUud2luZG93cy5uZXQifQ.RDcH01l3MFusvwnPZIbxPx73YpGg-Y-lWJZkJh2k68I&response-content-disposition=attachment%3B%20filename%3DOfficeServer.iso&response-content-type=application%2Foctet-stream"
        
        # بررسی کنید که فایل واقعاً وجود دارد
        curl --head --fail --silent $FILE_URL
        if [ $? -ne 0 ]; then
          echo "❌ فایل در آدرس مشخص شده یافت نشد! آدرس را بررسی کنید."
          exit 1
        fi
        
        # دانلود فایل
        echo "✅ دانلود فایل..."
        curl -L --fail -o OfficeServer.iso $FILE_URL
        
        if [ $? -eq 0 ]; then
          echo "✅ دانلود با موفقیت انجام شد."
          ls -lh OfficeServer.iso
        else
          echo "❌ خطا در دانلود فایل"
          exit 1
        fi
      working-directory: ${{ github.workspace }}

    - name: Commit and push the file
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add OfficeServer.iso
        git commit -m "Add OfficeServer.iso from Releases" || echo "هیچ تغییری برای commit وجود ندارد"
        git push
